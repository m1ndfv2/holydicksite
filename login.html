<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HolyDuck — Вход</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script src="theme.js" defer></script>
    <script src="auth.js" defer></script>
  </head>
  <body>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <header class="container hero hero-rules">
      <nav class="topbar">
        <div class="brand">HolyDuck</div>
        <div class="top-links">
          <button class="discord-chip theme-toggle" type="button" data-theme-toggle>🌙 Тёмная</button>
          <a class="discord-chip" href="index.html">Главная</a>
          <a class="discord-chip" href="rules.html">Правила</a>
          <a id="auth-entry-link" class="discord-chip auth-entry-link" href="login.html">Вход</a>
        </div>
      </nav>

      <p class="kicker">ACCOUNT</p>
      <h1>Страница <span>входа</span></h1>
    </header>

    <main class="container info-grid single-column-grid">
      <article id="login-tab-panel" class="card tab-panel" data-tab-panel="login">
        <p class="card-label">Авторизация</p>
        <p id="auth-welcome" class="card-text" hidden></p>
        <form id="login-form" class="login-form">
          <input class="input" type="text" name="username" placeholder="Логин" autocomplete="username" required />
          <input class="input" type="password" name="password" placeholder="Пароль" autocomplete="current-password" required />
          <button class="btn btn-primary" type="submit">Войти</button>
        </form>
        <button id="logout-btn" class="btn btn-secondary" type="button" hidden>Выйти</button>
        <p id="auth-status" class="card-text">Войдите с аккаунтом сервера.</p>
      </article>
    </main>
  </body>
</html>
